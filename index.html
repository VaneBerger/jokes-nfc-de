<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zufallswitz Generator</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
        }

        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        h1 {
            color: #333;
            margin-bottom: 25px;
        }

        .joke-box {
            background-color: #e9f7ef;
            border: 1px solid #d4edda;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 1.1em;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #28a745;
        }

        .error-box {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 10px;
            border-radius: 5px;
            margin-top: 15px;
            display: none;
        }

        button {
            background-color: #007bff;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
    <script src="joke_de_async.js" defer></script>
</head>
<body>
<div class="container">
    <h1>Dein täglicher Witz</h1>
    <div id="joke-display" class="joke-box">
        <p>Lade einen Witz...</p>
    </div>
    <button id="get-joke-btn">Neuer Witz</button>
    <div id="error-message" class="error-box"></div>
</div>
</body>
</html>
